<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caspra Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="starfield"></canvas>

  <main class="space">
    <div class="product aurelia" data-href="#aurelia" style="--x: 58%; --y: 22%; --color: #5DCAA5; --glow: rgba(93,202,165,0.35);">
      <div class="planet-body">
        <div class="planet-core"></div>
        <div class="planet-ring"></div>
      </div>
      <span class="product-name">Aurelia</span>
    </div>

    <div class="product latamtax" data-href="#latamtax" style="--x: 22%; --y: 55%; --color: #C8894A; --glow: rgba(200,137,74,0.35);">
      <div class="planet-body">
        <div class="planet-core"></div>
        <div class="planet-ring"></div>
      </div>
      <span class="product-name">LatamTax</span>
    </div>

    <div class="product hc360" data-href="#hc360" style="--x: 72%; --y: 65%; --color: #7BAFD4; --glow: rgba(123,175,212,0.35);">
      <div class="planet-body">
        <div class="planet-core"></div>
        <div class="planet-ring"></div>
      </div>
      <span class="product-name">HC360</span>
    </div>

    <div class="holding-name">caspra labs</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
